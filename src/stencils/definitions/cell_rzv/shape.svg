<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 30" width="40" height="30">
  <!--
    «РЗВ» — разъединитель заземления (горизонтально, заземление слева, порт справа).
    Привязка: {prefix}.ONOFF
      true  → замкнут (рычаг горизонтально к контакту земли)
      false → открыт (рычаг отклонён вверх-влево, разрыв)
  -->
  <g data-anim-suffix=".RZV">
    <!-- Правый хвост к порту -->
    <line x1="40" y1="15" x2="30" y2="15" stroke="#000" stroke-width="2"/>

    <!-- Замкнутый рычаг: горизонтальная линия + короткая перпендикулярная риска
         (как у выключателя). Скрывается целиком когда ONOFF=false. -->
    <g data-anim-suffix=".RZV-closed">
      <line x1="30" y1="15" x2="10" y2="15" stroke="#000" stroke-width="2"/>
      <line x1="32" y1="11" x2="32" y2="19" stroke="#000" stroke-width="2"/>
    </g>

    <!-- Открытый рычаг (отклонён вверх-влево). Скрывается когда ONOFF=true. -->
    <line data-anim-suffix=".RZV-open"
          x1="18" y1="15" x2="30" y2="5"
          stroke="#000" stroke-width="2"/>

    <!-- Заземление слева: три вертикальные линии убывающей длины -->
    <line x1="10" y1="8"  x2="10" y2="22" stroke="#000" stroke-width="1.5"/>
    <line x1="7"  y1="10" x2="7"  y2="20" stroke="#000" stroke-width="1.5"/>
    <line x1="4"  y1="12" x2="4"  y2="18" stroke="#000" stroke-width="1.5"/>
  </g>
</svg>
