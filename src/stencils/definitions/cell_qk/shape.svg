<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 40" width="20" height="40">
  <!--
    «Короткозамыкатель» — вертикальная конструкция, статичная графика без
    привязки к тегам. Аналогично отделителю (cell_qr), но снизу вместо порта
    стоит знак заземления (три горизонтальные линии убывающей длины).
    Рычаг отклонён влево (разомкнутое положение).
  -->
  <g>
    <!-- Хвост к верхнему порту -->
    <line x1="10" y1="0" x2="10" y2="12" stroke="#000" stroke-width="2"/>

    <!-- Верхний контакт (T-перекладина) -->
    <line x1="6" y1="12" x2="14" y2="12" stroke="#000" stroke-width="2"/>

    <!-- Шарнир (tms-voltage-fill → перекрашивается в симуляции и runtime) -->
    <circle cx="10" cy="24" r="2" fill="#000" class="tms-voltage-fill"/>

    <!-- Разомкнутый рычаг (диагональ от шарнира влево-вверх) -->
    <line x1="10" y1="24" x2="2" y2="16" stroke="#000" stroke-width="2"/>

    <!-- Подводка к заземлению (вертикаль от шарнира) -->
    <line x1="10" y1="24" x2="10" y2="30" stroke="#000" stroke-width="2"/>

    <!-- Знак заземления: три горизонтальные линии убывающей длины -->
    <line x1="2" y1="30" x2="18" y2="30" stroke="#000" stroke-width="2"/>
    <line x1="5" y1="34" x2="15" y2="34" stroke="#000" stroke-width="2"/>
    <line x1="8" y1="38" x2="12" y2="38" stroke="#000" stroke-width="2"/>
  </g>
</svg>
