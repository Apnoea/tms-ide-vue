<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 30" width="40" height="30">
  <!--
    «Трансформатор напряжения трёхфазный» — три пересекающиеся окружности
    в треугольной расстановке (фаза A сверху, B/C снизу). Расстояния между
    центрами ~12px при r=8 → ~4px overlap у каждой пары: треугольный
    Venn-узор, классический ГОСТ-символ ТН-3ф. Статика, без анимации.
  -->
  <g>
    <!-- Фаза A (сверху) — порт сверху на касательной верхней окружности -->
    <circle cx="20" cy="8" r="8" fill="none" stroke="#000" stroke-width="2"/>

    <!-- Фазы B и C (снизу-слева и снизу-справа) -->
    <circle cx="14" cy="18" r="8" fill="none" stroke="#000" stroke-width="2"/>
    <circle cx="26" cy="18" r="8" fill="none" stroke="#000" stroke-width="2"/>

    <!-- Хвосты к нижним портам (короткие вертикальные линии от точек,
         где x=10/x=30 пересекают нижние окружности, до самого порта). -->
    <line x1="10" y1="25" x2="10" y2="30" stroke="#000" stroke-width="2"/>
    <line x1="30" y1="25" x2="30" y2="30" stroke="#000" stroke-width="2"/>
  </g>
</svg>
