<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!--
    «Выключатель» — компактный 40×40 квадрат, привязка к {prefix}.ONOFF.
    ONOFF=true (включён, контакт замкнут) → внутри «+»
    ONOFF=false (выключен, разомкнут)      → внутри «−»
    idSuffix'ы «.VK» / «.VK-cross» специально нестандартные, чтобы не конфликтовали
    с anim-id'шниками других стенсилов, если они сидят на одном prefix'е.
  -->
  <g data-anim-suffix=".VK">
    <!-- Сам квадрат -->
    <rect x="0" y="0" width="40" height="40"
          fill="#fff" stroke="#000" stroke-width="1.5"/>

    <!-- Горизонтальная палочка («−») — всегда видна -->
    <line x1="10" y1="20" x2="30" y2="20"
          stroke="#000" stroke-width="2.5"/>

    <!-- Вертикальная палочка («|»), вместе с горизонтальной = «+».
         Видна когда ONOFF=true (включено/замкнуто), скрыта когда OFF. -->
    <line data-anim-suffix=".VK-cross"
          x1="20" y1="10" x2="20" y2="30"
          stroke="#000" stroke-width="2.5"/>
  </g>
</svg>
