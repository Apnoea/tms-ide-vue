<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="20" height="20">
  <!--
    «Выключатель» — компактный 20×20 квадрат, slot.onoff = Boolean.
    ONOFF=true (включён, контакт замкнут) → внутри «+»
    ONOFF=false (выключен, разомкнут)      → внутри «−»
    idSuffix'ы «.QW» / «.QW-cross» уникальны в пределах стенсила (на cellId
    они становятся `animation-{cellId}.QW` и т.п.).
  -->
  <g data-anim-suffix=".QW">
    <!-- Сам квадрат -->
    <rect x="0" y="0" width="20" height="20"
          fill="#fff" stroke="#000" stroke-width="2"/>

    <!-- Горизонтальная палочка («−») — всегда видна -->
    <line x1="5" y1="10" x2="15" y2="10"
          stroke="#000" stroke-width="2"/>

    <!-- Вертикальная палочка («|»), вместе с горизонтальной = «+».
         Видна когда ONOFF=true (включено/замкнуто), скрыта когда OFF. -->
    <line data-anim-suffix=".QW-cross"
          x1="10" y1="5" x2="10" y2="15"
          stroke="#000" stroke-width="2"/>
  </g>
</svg>
