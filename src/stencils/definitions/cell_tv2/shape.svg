<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 40" width="20" height="40">
  <!--
    «Трансформатор напряжения» — ГОСТ-стиль: две пересекающиеся окружности
    по вертикали (первичная сверху, вторичная снизу). Хвосты от портов к
    верхней/нижней точке соответствующих обмоток. Статика, без анимации.
  -->
  <g>
    <!-- Хвосты к портам -->
    <line x1="10" y1="0"  x2="10" y2="6"  stroke="#000" stroke-width="2"/>
    <line x1="10" y1="34" x2="10" y2="40" stroke="#000" stroke-width="2"/>

    <!-- Верхняя обмотка (ВН) -->
    <circle cx="10" cy="14" r="8" fill="none" stroke="#000" stroke-width="2"/>

    <!-- Нижняя обмотка (НН), смещена так чтобы окружности пересекались -->
    <circle cx="10" cy="26" r="8" fill="none" stroke="#000" stroke-width="2"/>
  </g>
</svg>
