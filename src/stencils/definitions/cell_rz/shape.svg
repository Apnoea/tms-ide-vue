<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 40" width="20" height="40">
  <!--
    «Разъединитель» (РЗ/РШ/РЗЛ — все одинаковая графика).
    Шарнир — внизу, фиксированный контакт — сверху.
    Привязка: {prefix}.ONOFF
      true  → закрытое положение (рычаг вертикально)
      false → открытое положение (рычаг отклонён вверх-влево)

    В IDE-редакторе обе линии видны одновременно (выглядит как развилка от шарнира).
    В runtime'е WebScada скрывается тот рычаг, который не соответствует состоянию.

    idSuffix'ы «.RZ» / «.RZ-closed» / «.RZ-open» нестандартные — чтобы не
    конфликтовать с anim-id'шниками других стенсилов на одном prefix'е.
  -->
  <g data-anim-suffix=".RZ">
    <!-- Верхний и нижний «хвосты» (статика) -->
    <line x1="10" y1="0"  x2="10" y2="12" stroke="#000" stroke-width="2"/>
    <line x1="10" y1="28" x2="10" y2="40" stroke="#000" stroke-width="2"/>

    <!-- Верхний контакт (фиксированная горизонтальная риска) -->
    <line x1="6"  y1="12" x2="14" y2="12" stroke="#000" stroke-width="1.5"/>

    <!-- Замкнутый рычаг (вертикальная линия от шарнира к контакту).
         Скрывается классом .animation-hidden когда ONOFF=false. -->
    <line data-anim-suffix=".RZ-closed"
          x1="10" y1="12" x2="10" y2="28"
          stroke="#000" stroke-width="2"/>

    <!-- Разомкнутый рычаг (наклонная линия от шарнира вверх-влево).
         Скрывается когда ONOFF=true. -->
    <line data-anim-suffix=".RZ-open"
          x1="10" y1="28" x2="0"  y2="16"
          stroke="#000" stroke-width="2"/>
  </g>
</svg>
