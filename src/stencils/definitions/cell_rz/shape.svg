<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 40" width="20" height="40">
  <!--
    «Разъединитель» — статичная графика без привязки к тегам.
    Рычаг отклонён вверх-влево (разомкнутое состояние) — стандартная
    «декларативная» поза разъединителя на схемах.
  -->
  <g>
    <!-- Верхний и нижний хвосты к портам -->
    <line x1="10" y1="0"  x2="10" y2="12" stroke="#000" stroke-width="2"/>
    <line x1="10" y1="28" x2="10" y2="40" stroke="#000" stroke-width="2"/>

    <!-- Верхний контакт (горизонтальная риска) -->
    <line x1="6" y1="12" x2="14" y2="12" stroke="#000" stroke-width="2"/>

    <!-- Шарнир -->
    <circle cx="10" cy="28" r="0.5" stroke="#000"/>

    <!-- Разомкнутый рычаг (диагональ от шарнира внизу) -->
    <line x1="10" y1="28" x2="0" y2="16" stroke="#000" stroke-width="2"/>
  </g>
</svg>
