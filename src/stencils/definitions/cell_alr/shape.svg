<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 36" width="40" height="36">
  <!--
    Аварийный сигнал — стандартный warning-треугольник с «!».
    slot.alr = Boolean:
      true  → виден (тревога активна)
      false → скрыт (animation-hidden)
    Цвет жёлтый (#facc15 = yellow-400 в Tailwind) — общепринятый «warning»-оттенок.
  -->
  <g data-anim-suffix=".ALR">
    <polygon points="20,3 37,33 3,33"
             fill="#facc15"
             stroke="#000"
             stroke-width="2"
             stroke-linejoin="round"/>
    <!-- Восклицательный знак: вертикальная палочка + точка. Подняли вверх
         относительно центра треугольника, чтобы точка не «прижималась»
         к нижней границе — типичная композиция warning-знака.
         У точки fill="#000" — без opt-in класса .tms-voltage-fill CSS-правило
         voltage-источника красит только stroke (см. exporter), и точка
         оставалась чёрной в рантайме когда вокруг всё перекрашивалось. -->
    <line x1="20" y1="11" x2="20" y2="23"
          stroke="#000" stroke-width="2" stroke-linecap="round"/>
    <circle cx="20" cy="28" r="1.5" fill="#000" class="tms-voltage-fill"/>
  </g>
</svg>
