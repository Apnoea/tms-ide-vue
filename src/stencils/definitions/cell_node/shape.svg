<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 10" width="10" height="10">
  <!--
    Сервисная «точка соединения» — анкер для начала/конца провода без привязки
    к реальной ячейке. Маленький чёрный кружок-маркер в центре; JointJS-порт
    на той же точке (5,5) — при hover-проксимити проявится cyan-ring поверх.
  -->
  <circle cx="5" cy="5" r="2" fill="#000" />
</svg>
