<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 40" width="20" height="40">
  <!--
    «Отделитель» — slot.onoff = Boolean. Три состояния:
      • достоверно включён  (ONOFF=true)   — видна только .QR-closed (вертикаль)
      • достоверно отключён (ONOFF=false)  — видна только .QR-open   (диагональ)
      • неопределено        (тег не пришёл) — видны ОБА рычага. Достигается без
        отдельного биндинга: ни true ни false не матчит на null/undefined,
        animation-hidden не накидывается, оба рычага остаются видны.
  -->
  <g>
    <!-- Хвосты к портам -->
    <line x1="10" y1="0"  x2="10" y2="12" stroke="#000" stroke-width="2"/>
    <line x1="10" y1="28" x2="10" y2="40" stroke="#000" stroke-width="2"/>

    <!-- Верхний контакт (T-перекладина) -->
    <line x1="6" y1="12" x2="14" y2="12" stroke="#000" stroke-width="2"/>

    <!-- Шарнир (tms-voltage-fill → перекрашивается в симуляции и runtime) -->
    <circle cx="10" cy="28" r="2" fill="#000" class="tms-voltage-fill" />

    <!-- Положение «замкнут» (вертикальный рычаг) — видно при ONOFF=true -->
    <line data-anim-suffix=".QR-closed"
          x1="10" y1="28" x2="10" y2="12"
          stroke="#000" stroke-width="2"/>

    <!-- Положение «разомкнут» (диагональ влево-вниз) — видно при ONOFF=false -->
    <line data-anim-suffix=".QR-open"
          x1="10" y1="28" x2="0" y2="16"
          stroke="#000" stroke-width="2"/>
  </g>
</svg>
